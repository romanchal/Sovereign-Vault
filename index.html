<!DOCTYPE html>
<html lang="en" class="dark scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Romanchal | Sovereign Executive Hub</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;800&family=Playfair+Display:ital,wght@1,900&display=swap" rel="stylesheet">
    <style>
        body { background: #05070a; font-family: 'Plus Jakarta Sans', sans-serif; color: #94a3b8; }
        .gold-text { background: linear-gradient(to right, #bf953f, #fcf6ba, #b38728); background-clip: text; -webkit-text-fill-color: transparent; }
        .glass-panel { background: rgba(15, 23, 42, 0.4); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.05); transition: 0.3s; }
        .glass-panel:hover { border-color: #eab308; transform: translateY(-5px); }
        .quality-btn.active { background: #eab308; color: #000; border-color: transparent; }
    </style>
</head>
<body class="selection:bg-gold-500 selection:text-black">

    <nav class="fixed w-full z-50 bg-[#05070a]/80 backdrop-blur-xl border-b border-white/5 h-20 flex items-center px-8 justify-between">
        <div class="flex items-center gap-3">
            <div class="w-10 h-10 bg-gradient-to-br from-amber-400 to-amber-700 rounded-lg flex items-center justify-center shadow-lg shadow-amber-500/20">
                <i class="fa-solid fa-crown text-black"></i>
            </div>
            <h1 class="font-serif italic text-2xl text-white tracking-tighter uppercase">Romanchal</h1>
        </div>
        <a href="https://t.me/BLUE_SNOW_BLOGGER" class="bg-white/5 border border-white/10 px-5 py-2 rounded-lg text-[10px] font-black uppercase tracking-widest hover:bg-amber-500 hover:text-black transition-all">VIP Access</a>
    </nav>

    <header class="pt-48 pb-20 text-center px-6">
        <h2 class="text-6xl md:text-8xl font-serif font-black text-white mb-6 uppercase italic leading-none">The <span class="gold-text">Sovereign</span> Hub</h2>
        <p class="text-slate-500 text-sm tracking-widest uppercase font-bold">Engineered by Alex Promoting Agency • 2 Year Excellence</p>
    </header>

    <section class="max-w-6xl mx-auto px-6 mb-32">
        <div class="glass-panel p-10 rounded-[40px] shadow-2xl relative overflow-hidden">
            <div class="flex flex-col md:flex-row justify-between items-center gap-8 mb-10">
                <div class="text-left">
                    <h3 class="text-white font-black uppercase text-xl italic tracking-tighter">Media Command Center</h3>
                    <p class="text-[9px] text-slate-600 uppercase font-black tracking-[0.4em]">Multi-Format Master Extraction</p>
                </div>
                <div class="flex bg-black/40 p-1.5 rounded-2xl border border-white/5 gap-2 overflow-x-auto hide-scrollbar">
                    <button onclick="setMode('mp3')" id="btn-mp3" class="quality-btn active px-6 py-2.5 rounded-xl text-[10px] font-black uppercase tracking-widest border border-white/5 transition-all">MP3 Audio</button>
                    <button onclick="setMode('mp4', '360')" id="btn-360" class="quality-btn px-6 py-2.5 rounded-xl text-[10px] font-black uppercase tracking-widest border border-white/5 transition-all">360p</button>
                    <button onclick="setMode('mp4', '720')" id="btn-720" class="quality-btn px-6 py-2.5 rounded-xl text-[10px] font-black uppercase tracking-widest border border-white/5 transition-all">720p HD</button>
                    <button onclick="setMode('mp4', '1080')" id="btn-1080" class="quality-btn px-6 py-2.5 rounded-xl text-[10px] font-black uppercase tracking-widest border border-white/5 transition-all">1080p Ultra</button>
                </div>
            </div>

            <div class="flex flex-col gap-4">
                <input type="url" id="sourceUrl" placeholder="PASTE YOUTUBE OR INSTAGRAM LINK..." class="w-full bg-black/60 border border-white/5 rounded-2xl p-6 text-sm text-white focus:outline-none focus:border-amber-500 transition-all font-mono">
                <button onclick="initiateExtraction()" id="masterBtn" class="w-full bg-white hover:bg-amber-500 text-black font-black py-6 rounded-2xl uppercase tracking-[0.4em] text-[11px] shadow-xl transition-all flex items-center justify-center gap-3">
                    <i class="fa-solid fa-bolt"></i> Initiate Sovereign Capture
                </button>
            </div>
            <div id="progressBox" class="hidden mt-8">
                <div class="flex justify-between text-[9px] font-black uppercase tracking-widest mb-2 text-amber-500">
                    <span>Securing Stream...</span>
                    <span id="percent">0%</span>
                </div>
                <div class="w-full h-1.5 bg-black rounded-full overflow-hidden">
                    <div id="progressBar" class="h-full bg-amber-500 shadow-[0_0_15px_#eab308]" style="width: 0%"></div>
                </div>
            </div>
        </div>
    </section>

    <main class="max-w-7xl mx-auto px-6 pb-40">
        <div class="flex justify-between items-end mb-16 border-b border-white/5 pb-8">
            <h3 class="text-4xl font-serif font-black text-white italic tracking-tighter uppercase leading-none">The <span class="gold-text">Vault</span></h3>
            <div class="flex gap-4 text-[9px] font-black uppercase tracking-widest">
                <button onclick="fetchVault('All')" class="text-amber-500 border-b border-amber-500 pb-1">Global</button>
                <button onclick="fetchVault('Crypto')" class="text-slate-600 hover:text-white transition-all">Crypto</button>
                <button onclick="fetchVault('Gaming')" class="text-slate-600 hover:text-white transition-all">Gaming</button>
            </div>
        </div>
        <div id="vault-grid" class="grid grid-cols-1 md:grid-cols-3 gap-10">
            </div>
    </main>

    <script>
        let currentFmt = 'mp3';
        let currentQual = 'best';

        function setMode(fmt, qual = 'best') {
            currentFmt = fmt; currentQual = qual;
            document.querySelectorAll('.quality-btn').forEach(b => b.classList.remove('active'));
            const activeId = qual === 'best' ? 'btn-mp3' : `btn-${qual}`;
            document.getElementById(activeId).classList.add('active');
        }

        async function initiateExtraction() {
            const url = document.getElementById('sourceUrl').value;
            const btn = document.getElementById('masterBtn');
            const pBox = document.getElementById('progressBox');
            if(!url) return alert("Link required.");

            btn.disabled = true; pBox.classList.remove('hidden');
            let progress = 0;
            const interval = setInterval(() => {
                if(progress < 90) progress += 2;
                document.getElementById('progressBar').style.width = progress + '%';
                document.getElementById('percent').innerText = progress + '%';
            }, 500);

            try {
                const res = await fetch("http://127.0.0.1:8000/api/process-media", {
                    method: 'POST', headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ url: url, format: currentFmt, quality: currentQual })
                });
                const blob = await res.blob();
                const a = document.createElement('a');
                a.href = URL.createObjectURL(blob);
                a.download = `Sovereign_Media.${currentFmt}`;
                a.click();
            } catch { alert("Vault Security: Failed"); }
            finally {
                clearInterval(interval);
                btn.disabled = false; pBox.classList.add('hidden');
            }
        }

        async function fetchVault(cat) {
            const res = await fetch("http://127.0.0.1:8000/api/get-offers");
            const data = await res.json();
            const filtered = cat === 'All' ? data : data.filter(o => o.category === cat);
            document.getElementById('vault-grid').innerHTML = filtered.map(o => `
                <div class="glass-panel p-10 rounded-[40px] flex flex-col group">
                    <div class="flex justify-between items-start mb-10">
                        <img src="${o.logo_url}" class="w-14 h-14 object-contain rounded-2xl bg-black border border-white/5">
                        <span class="text-[9px] font-black uppercase text-slate-600 tracking-widest">${o.category}</span>
                    </div>
                    <h4 class="text-2xl font-black text-white italic tracking-tighter uppercase mb-2">${o.app_name}</h4>
                    <p class="text-[10px] text-slate-700 font-bold uppercase tracking-widest mb-10">Status: Verified</p>
                    <div class="flex justify-between items-end pt-8 border-t border-white/5">
                        <div>
                            <span class="text-[9px] text-slate-500 uppercase font-black block mb-2">Yield</span>
                            <div class="text-3xl font-black text-white font-serif italic">${o.reward_amount}</div>
                        </div>
                        <a href="http://127.0.0.1:8000/redirect/${o.id}" target="_blank" class="bg-white/5 hover:bg-amber-500 hover:text-black border border-white/10 px-8 py-3 rounded-xl text-[10px] font-black uppercase tracking-widest transition-all">Secure</a>
                    </div>
                </div>
            `).join('');
        }
        fetchVault('All');
    </script>
</body>
</html>
