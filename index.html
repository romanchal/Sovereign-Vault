<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sovereign Vault | Roman's Cyber Lab</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@700;900&family=Inter:wght@400;900&display=swap');
        body { background-color: #05070a; color: white; font-family: 'Inter', sans-serif; overflow-x: hidden; }
        .gold-text {
            background: linear-gradient(to right, #bf953f, #fcf6ba, #b38728);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            color: transparent;
        }
        .glass-panel {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.05);
        }
        .quality-btn.active { background: #eab308; color: black; border-color: #eab308; }
    </style>
</head>
<body class="selection:bg-gold-500 selection:text-black">

    <div class="w-full h-24 bg-black/40 border-b border-white/5 flex items-center justify-center mt-20">
        <div class="text-[9px] font-black uppercase tracking-[0.5em] text-slate-800 italic border border-white/5 px-6 py-3 rounded-xl">
            [ PLACE CPAGRIP BANNER CODE HERE ]
        </div>
    </div>

    <nav class="fixed top-0 w-full z-50 bg-[#05070a]/90 backdrop-blur-xl border-b border-white/5 h-20 flex items-center px-8 justify-between">
        <div class="flex items-center gap-3">
            <div class="w-10 h-10 bg-gradient-to-br from-amber-400 to-amber-700 rounded-lg flex items-center justify-center shadow-lg shadow-amber-500/20">
                <i class="fa-solid fa-crown text-black"></i>
            </div>
            <h1 class="font-black text-2xl tracking-tighter uppercase italic">Roman</h1>
        </div>
        <div class="flex gap-4">
             <a href="/admin.html" class="text-slate-600 hover:text-amber-500 transition-all text-[10px] font-black uppercase">Vault Admin</a>
             <div id="serverStatus" class="flex items-center gap-2 text-[10px] font-black uppercase text-green-500">
                <span class="w-2 h-2 bg-green-500 rounded-full animate-pulse"></span> Engine Live
             </div>
        </div>
    </nav>

    <header class="pt-20 pb-12 text-center px-6">
        <h2 class="text-5xl md:text-7xl font-black text-white mb-4 uppercase italic leading-none">The <span class="gold-text">Sovereign</span> Hub</h2>
        <p class="text-slate-500 text-[10px] tracking-[0.6em] uppercase font-bold">Cyber Lab Extraction • v4.0 Secure</p>
    </header>

    <section class="max-w-7xl mx-auto px-6 grid grid-cols-1 lg:grid-cols-4 gap-8 mb-20">
        
        <div class="hidden lg:flex flex-col gap-4">
            <div class="glass-panel p-6 rounded-3xl h-[400px] flex items-center justify-center text-center opacity-30">
                 <p class="text-[8px] font-black uppercase">Sidebar Ad Space</p>
            </div>
        </div>

        <div class="lg:col-span-2 glass-panel p-10 rounded-[40px] shadow-2xl border-amber-500/10">
            <div class="flex bg-black/40 p-1.5 rounded-2xl border border-white/5 gap-1 mb-10 justify-center">
                <button onclick="setMode('mp3')" id="btn-mp3" class="quality-btn active px-4 py-2.5 rounded-xl text-[9px] font-black uppercase transition-all">MP3</button>
                <button onclick="setMode('mp4', '720')" id="btn-720" class="quality-btn px-4 py-2.5 rounded-xl text-[9px] font-black uppercase transition-all">720p HD</button>
                <button onclick="setMode('mp4', '1080')" id="btn-1080" class="quality-btn px-4 py-2.5 rounded-xl text-[9px] font-black uppercase transition-all">1080p Ultra</button>
            </div>

            <div class="space-y-4">
                <input type="url" id="sourceUrl" placeholder="PASTE URL (YT / INSTA / FB)..." class="w-full bg-black/60 border border-white/10 rounded-2xl p-6 text-sm text-white focus:outline-none focus:border-amber-500 transition-all font-mono">
                <button onclick="initiateExtraction()" id="masterBtn" class="w-full bg-white hover:bg-amber-500 text-black font-black py-6 rounded-2xl uppercase tracking-[0.4em] text-[11px] transition-all flex items-center justify-center gap-3">
                    <i class="fa-solid fa-bolt"></i> Initiate Extraction
                </button>
            </div>

            <div id="progressBox" class="hidden mt-8">
                <div class="flex justify-between text-[9px] font-black uppercase tracking-widest mb-2 text-amber-500">
                    <span id="statusText">Securing Link...</span>
                    <span id="percent">0%</span>
                </div>
                <div class="w-full h-1.5 bg-black rounded-full overflow-hidden">
                    <div id="progressBar" class="h-full bg-amber-500 transition-all duration-500" style="width: 0%"></div>
                </div>
            </div>
        </div>

        <div class="hidden lg:flex flex-col gap-4">
            <div class="glass-panel p-6 rounded-3xl h-[400px] flex items-center justify-center text-center opacity-30">
                 <p class="text-[8px] font-black uppercase">Sidebar Ad Space</p>
            </div>
        </div>
    </section>

    <script>
        // --- CONFIGURATION ---
        const API = "https://sovereign-vault.onrender.com";
        const GPLINKS_TOKEN = "2e518add565072a86e95da27b60c9a370b1c017f";
        let currentFmt = 'mp3', currentQual = 'best';

        // --- AUTO-PING METHOD (Keeps Render Awake) ---
        function keepAlive() {
            console.log("Sovereign Protocol: Sending Heartbeat...");
            fetch(`${API}/api/get-offers`).catch(() => console.log("Engine waking up..."));
        }
        setInterval(keepAlive, 13 * 60 * 1000); // Ping every 13 mins
        keepAlive(); // Initial ping

        function setMode(fmt, qual = 'best') {
            currentFmt = fmt; currentQual = qual;
            document.querySelectorAll('.quality-btn').forEach(b => b.classList.remove('active'));
            const id = fmt === 'mp3' ? 'btn-mp3' : `btn-${qual}`;
            document.getElementById(id).classList.add('active');
        }

        async function initiateExtraction() {
            const url = document.getElementById('sourceUrl').value;
            const btn = document.getElementById('masterBtn');
            const pBox = document.getElementById('progressBox');
            if(!url) return alert("URL Required.");

            btn.disabled = true; pBox.classList.remove('hidden');
            let progress = 0;
            const loader = setInterval(() => {
                if(progress < 90) progress += Math.random() * 4;
                document.getElementById('progressBar').style.width = progress + '%';
                document.getElementById('percent').innerText = Math.floor(progress) + '%';
            }, 600);

            try {
                // Step 1: Process via Backend
                const res = await fetch(`${API}/api/process-media`, {
                    method: 'POST', headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ url, format: currentFmt, quality: currentQual })
                });
                const info = await res.json();
                
                // Step 2: Generate Monetized Link (GPLinks)
                const targetLink = `${API}/api/download-ready/${info.id}`;
                const gpUrl = `https://gplinks.com/api?api=${GPLINKS_TOKEN}&url=${encodeURIComponent(targetLink)}&format=text`;
                
                const shortRes = await fetch(gpUrl);
                const paidLink = await shortRes.text();

                // Step 3: Reveal Paid Button
                clearInterval(loader);
                document.getElementById('progressBar').style.width = '100%';
                document.getElementById('statusText').innerText = "EXTRACTION SUCCESSFUL";
                btn.innerHTML = `<i class="fa-solid fa-cloud-arrow-down"></i> SECURE DOWNLOAD`;
                btn.onclick = () => window.location.href = paidLink;
                btn.className = "w-full bg-amber-500 text-black font-black py-6 rounded-2xl uppercase shadow-[0_0_25px_#eab308]";
                btn.disabled = false;
            } catch (e) {
                alert("Engine Busy or URL Invalid.");
                btn.disabled = false;
                clearInterval(loader);
            }
        }
    </script>
</body>
</html>
