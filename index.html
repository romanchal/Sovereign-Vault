<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sovereign Hub | Roman's Cyber Lab</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;900&display=swap');
        body { background-color: #05070a; color: white; font-family: 'Inter', sans-serif; }
        .glass { background: rgba(255, 255, 255, 0.02); backdrop-filter: blur(15px); border: 1px solid rgba(255, 255, 255, 0.05); }
        .btn-active { background: #eab308 !important; color: black !important; box-shadow: 0 0 15px rgba(234, 179, 8, 0.3); }
    </style>
</head>
<body class="selection:bg-amber-500 selection:text-black">

    <nav class="p-6 flex justify-between items-center border-b border-white/5 bg-[#05070a]/80 sticky top-0 z-50">
        <div class="flex items-center gap-3">
            <div class="w-9 h-9 bg-amber-500 rounded flex items-center justify-center">
                <i class="fa-solid fa-bolt-lightning text-black"></i>
            </div>
            <h1 class="font-black text-lg tracking-tighter uppercase italic">Roman</h1>
        </div>
        <div class="text-[9px] font-black uppercase text-amber-500/60 tracking-widest">v5.0 Stable</div>
    </nav>

    <main class="max-w-2xl mx-auto px-6 py-16">
        <div class="text-center mb-10">
            <h2 class="text-5xl font-black mb-2 italic uppercase tracking-tighter">Sovereign <span class="text-amber-500">Hub</span></h2>
            <p class="text-slate-500 text-[9px] tracking-[0.4em] font-bold uppercase">No Limits • No Ads • Pure Extraction</p>
        </div>

        <div class="glass p-8 rounded-[32px] shadow-2xl">
            <div class="flex bg-black/40 p-1 rounded-xl border border-white/5 gap-1 mb-8">
                <button onclick="setMode('mp3')" id="m-mp3" class="flex-1 py-3 rounded-lg text-[10px] font-black uppercase btn-active transition-all">Audio</button>
                <button onclick="setMode('mp4')" id="m-mp4" class="flex-1 py-3 rounded-lg text-[10px] font-black uppercase bg-transparent transition-all">Video</button>
            </div>

            <div class="space-y-4">
                <input type="url" id="urlInput" placeholder="Paste YouTube/Insta/FB Link..." 
                       class="w-full bg-black/40 border border-white/10 rounded-xl p-5 text-sm focus:outline-none focus:border-amber-500 transition-all font-mono">
                
                <button onclick="run()" id="mainBtn" class="w-full bg-white hover:bg-amber-500 text-black font-black py-5 rounded-xl uppercase tracking-[0.2em] text-[11px] transition-all flex items-center justify-center gap-3">
                    Start Extraction
                </button>
            </div>

            <div id="loader" class="hidden mt-8">
                <div class="flex justify-between text-[9px] font-black uppercase mb-2 text-amber-500">
                    <span id="loadText">Processing Stream...</span>
                    <span id="loadPercent">0%</span>
                </div>
                <div class="w-full h-1 bg-white/5 rounded-full overflow-hidden">
                    <div id="bar" class="h-full bg-amber-500 transition-all duration-300" style="width: 0%"></div>
                </div>
            </div>
        </div>
    </main>

    <script>
        const API = "https://sovereign-vault.onrender.com";
        let mode = 'mp3';

        function setMode(m) {
            mode = m;
            document.querySelectorAll('button[id^="m-"]').forEach(b => b.classList.remove('btn-active'));
            document.getElementById(`m-${m}`).classList.add('btn-active');
        }

        async function run() {
            const url = document.getElementById('urlInput').value;
            const btn = document.getElementById('mainBtn');
            const loader = document.getElementById('loader');
            if(!url) return alert("Enter URL");

            btn.disabled = true; loader.classList.remove('hidden');
            let p = 0;
            const i = setInterval(() => { if(p < 90) p += 2; bar.style.width = p + '%'; loadPercent.innerText = p + '%'; }, 400);

            try {
                const r = await fetch(`${API}/api/process-media`, {
                    method: 'POST', headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ url, format: mode })
                });
                if(!r.ok) throw new Error();
                const b = await r.blob();
                const d = window.URL.createObjectURL(b);
                const a = document.createElement('a');
                a.href = d; a.download = `Sovereign_${Date.now()}.${mode}`;
                a.click();
                clearInterval(i); bar.style.width = '100%'; loadPercent.innerText = '100%';
            } catch (e) { alert("Server Busy. Try again."); clearInterval(i); }
            finally { btn.disabled = false; setTimeout(() => loader.classList.add('hidden'), 3000); }
        }
    </script>
</body>
</html>
